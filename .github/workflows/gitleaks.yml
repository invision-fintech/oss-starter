name: gitleaks
on:
  push:
  pull_request:
permissions:
  contents: read
env:
  # Pinned so a scanner release can't turn every open PR red without warning.
  GITLEAKS_VERSION: 8.30.1
jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # NOTE: gitleaks/gitleaks-action@v2 requires a paid licence for
      # organization-owned repos and fails closed without one. We run the
      # scanner binary directly instead — same rules, same exit codes, no licence.
      - name: Install gitleaks
        run: |
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      - name: Scan git history for secrets
        run: gitleaks git . --redact --verbose --no-banner
